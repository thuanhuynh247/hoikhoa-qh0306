<style>

<script>
// ══ CONFIG ══
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS9XbmIEYbYTIzcgA3jp31t21l2zcCyfx0ww8QK-xZ8sPOF4iERCS1WQWJBVhGUMmlAWrUHoSn24k3B/pub?output=csv';

const COLORS = [
  '#FF7043','#FFA040','#F5C518','#D4A843','#E05540',
  '#F48FB1','#F5ECD6','#E8A030','#E53935','#80CBC4',
  '#CE93D8','#A5D6A7','#E6EE9C','#90CAF9','#DCEDC8'
];

const LOP_ORDER = [
  '12/1','12/2','12/3','12/4','12/5','12/6','12/7','12/8',
  '12/9','12/10','12 Toán','12 Lý Sinh','12 Hóa','12 Anh','12 Văn Pháp'
];
const LOP_IDX = {};
LOP_ORDER.forEach((l,i) => LOP_IDX[l] = i);

// ══ STATE ══
let ALL=[], VIS=[], activeC='all', sq='', ITEMS=[], mx=0, my=0;

// ══ PARSE CSV ══
// Cấu trúc thực tế:
// Dòng 1: "DANH SÁCH LỚP" (merge)
// Dòng 2: "ĐĂNG KÝ THAM DỰ..." (merge)
// Dòng 3: "Lớp: 12/2" ở cột A (hoặc B)
// Dòng 4: Header: STT | Họ và tên | SĐT | Facebook | Nơi ở | Sinh nhật | Ghi chú
// Dòng 5+: 1 | Nguyễn Thị Mỹ Phương | ... | Huế | ...
// Lớp mới: lại có dòng "Lớp: 12/x" ở đầu section

function parseCSV(csvText) {
  const data = [];
  const lines = csvText.split('\n').map(l => l.trim()).filter(l => l);
  let currentLop = '';
  const LOP_PATTERN = /Lớp\s*[:\-]?\s*(12[\/\s]\w+)/i;
  const SKIP = /^(DANH SÁCH|ĐĂNG KÝ|STT|Họ và|Họ tên|TT\b|\d+\s*$)/i;

  lines.forEach(line => {
    // Parse CSV dòng
    const cols = parseCSVLine(line);
    if (!cols.length) return;

    // Ghép toàn bộ cột để tìm tên lớp
    const fullLine = cols.join(' ');

    // Detect tên lớp — ưu tiên tìm pattern "Lớp: 12/x"
    const lopMatch = fullLine.match(LOP_PATTERN);
    if (lopMatch) {
      // Chuẩn hóa tên lớp
      let rawLop = lopMatch[1].trim();
      // "12 2" → "12/2", "12/2" giữ nguyên
      rawLop = rawLop.replace(/^12\s+(\d+)$/, '12/$1');
      // Map về tên chuẩn
      currentLop = normalizeLop(rawLop);
      return;
    }

    // Skip header và dòng không phải tên
    const col0 = cols[0] || '';
    const col1 = cols[1] || '';

    // Dòng có tên người: cột 0 là STT (số), cột 1 là họ tên
    if (currentLop && /^\d+$/.test(col0.trim()) && col1.trim().length > 2) {
      const ten = col1.trim();
      if (!SKIP.test(ten) && isValidName(ten)) {
        data.push({ lop: currentLop, ten });
      }
      return;
    }

    // Một số sheet: cột 0 là họ tên thẳng (không có STT)
    if (currentLop && col0.trim().length > 2 && isValidName(col0) && !SKIP.test(col0)) {
      data.push({ lop: currentLop, ten: col0.trim() });
    }
  });

  return data;
}

function normalizeLop(raw) {
  // Thử match chính xác trước
  for (const l of LOP_ORDER) {
    if (raw === l) return l;
  }
  // Fuzzy: "12 Toan" → "12 Toán", v.v.
  const norm = raw
    .replace('Ly Sinh','Lý Sinh').replace('Ly sinh','Lý Sinh')
    .replace('Van Phap','Văn Pháp').replace('Van phap','Văn Pháp')
    .replace('Toan','Toán').replace('Hoa','Hóa')
    .replace('Anh','Anh');
  for (const l of LOP_ORDER) {
    if (norm === l || raw.replace(/\s+/g,' ').trim() === l) return l;
  }
  return raw; // fallback
}

function isValidName(s) {
  // Tên người Việt: có chữ cái, không phải URL, không phải số đơn thuần
  return s.length > 1 && s.length < 60
    && /[a-zA-ZÀ-ỹ]/.test(s)
    && !s.startsWith('http')
    && !/^\d+$/.test(s);
}

function parseCSVLine(line) {
  // Simple CSV parser xử lý quoted fields
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
    else { cur += c; }
  }
  result.push(cur.trim());
  return result;
}

// ══ LOAD DATA ══
function loadData() {
  // Dùng fetch với no-cors workaround qua proxy nếu cần
  // Primary: fetch trực tiếp
  fetch(CSV_URL)
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(csv => {
      const data = parseCSV(csv);
      if (data.length < 5) throw new Error('Quá ít dữ liệu: ' + data.length);
      console.log('Loaded', data.length, 'entries');
      init(data);
    })
    .catch(e => {
      console.warn('Fetch failed:', e.message, '— thử JSONP...');
      loadViaJSONP();
    });
}

// Fallback: Google Visualization API (JSONP)
function loadViaJSONP() {
  const sheetId = '1IiTJvCratKjE7tqBaliGAWCE-ve_tRgbrOyr_jK6e_4';
  const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&callback=_gvizCb`;
  window._gvizCb = function(res) {
    try {
      const rows = res.table.rows;
      const data = [];
      let lop = '';
      rows.forEach(row => {
        if (!row.c) return;
        const c0 = String(row.c[0]?.v || '').trim();
        const c1 = String(row.c[1]?.v || '').trim();
        const full = c0 + ' ' + c1;
        const m = full.match(/Lớp\s*[:\-]?\s*(12[\/\s]\w+)/i);
        if (m) { lop = normalizeLop(m[1].trim()); return; }
        const ten = c1 || c0;
        if (lop && isValidName(ten) && /^\d+$/.test(c0)) {
          data.push({ lop, ten });
        }
      });
      init(data.length > 5 ? data : getFallback());
    } catch(e) { init(getFallback()); }
  };
  const s = document.createElement('script');
  s.onerror = () => init(getFallback());
  s.src = url;
  document.head.appendChild(s);
}

function getFallback() {
  // Dữ liệu từ ảnh chụp (12/2) làm seed
  return [
    {lop:'12/2',ten:'Nguyễn Thị Mỹ Phương'},{lop:'12/2',ten:'Lê Thị Huyền'},
    {lop:'12/2',ten:'Phan Cảnh Bảo Hoàng'},{lop:'12/2',ten:'Huỳnh Anh Thuận'},
    {lop:'12/2',ten:'Trần Thị Hồng Miên'},{lop:'12/2',ten:'Nguyễn Thị Thanh Thủy'},
    {lop:'12/2',ten:'Lê Đình Khoa'},{lop:'12/2',ten:'Đinh Thị Trà My'},
    {lop:'12/2',ten:'Lê Thị Diệu Linh'},{lop:'12/2',ten:'Nguyễn Thị Thùy Giang'},
    {lop:'12/2',ten:'Võ Nguyên Tùng'},{lop:'12/2',ten:'Phan Thanh Bách'},
    {lop:'12/2',ten:'Bùi Thị Thanh Huyền'},{lop:'12/2',ten:'Nguyễn Thị Thu'},
    {lop:'12/2',ten:'Cao Thị Kiều Tiên'},{lop:'12/2',ten:'Lê Nguyễn Ngọc Long'},
    {lop:'12/2',ten:'Trần Duy Toàn'},{lop:'12/2',ten:'Trần Thị Đoan Trang'},
    {lop:'12/2',ten:'Phan Gia Long'},
  ];
}

// ══ INIT ══
function init(data) {
  ALL = data; VIS = data;
  document.getElementById('h-total').textContent = data.length;
  document.getElementById('h-lop').textContent = new Set(data.map(d=>d.lop)).size;
  document.getElementById('loading').style.display = 'none';
  buildFilters(); buildLegend(); layout(); initMag(); initCursor();
}

// ══ FILTERS ══
function buildFilters() {
  const strip = document.getElementById('fstrip');
  const search = strip.querySelector('.fsearch');
  LOP_ORDER.forEach(lop => {
    if (!ALL.find(d => d.lop === lop)) return;
    const cnt = ALL.filter(d => d.lop === lop).length;
    const ci = LOP_IDX[lop] ?? 0;
    const p = document.createElement('div');
    p.className = 'fpill';
    p.textContent = lop + ' (' + cnt + ')';
    p.dataset.c = COLORS[ci];
    p.onclick = function() { fc(lop, this); };
    strip.insertBefore(p, search);
  });
}

function buildLegend() {
  const wrap = document.getElementById('legend');
  LOP_ORDER.forEach(lop => {
    const cnt = ALL.filter(d => d.lop === lop).length;
    if (!cnt) return;
    const ci = LOP_IDX[lop] ?? 0;
    const d = document.createElement('div');
    d.className = 'litem'; d.dataset.lop = lop;
    d.innerHTML = `<span class="ldot" style="background:${COLORS[ci]}"></span><span class="llbl">${lop}</span><span class="lcnt">${cnt}</span>`;
    d.onclick = function() {
      const on = this.classList.contains('on');
      fc(on ? 'all' : lop, null);
      document.querySelectorAll('.litem').forEach(i => i.classList.remove('on'));
      if (!on) this.classList.add('on');
    };
    wrap.appendChild(d);
  });
}

function fc(lop, el) {
  activeC = lop;
  document.querySelectorAll('.fpill').forEach(p => { p.classList.remove('on'); p.style.background = ''; p.style.color = ''; });
  if (el) {
    el.classList.add('on');
    el.style.background = el.dataset.c || '';
    el.style.color = isLight(el.dataset.c || '') ? '#080402' : '#fff';
  } else if (lop === 'all') {
    document.querySelector('.fpill').classList.add('on');
  }
  document.querySelectorAll('.litem').forEach(i => i.classList.remove('on'));
  if (lop !== 'all') {
    const li = document.querySelector(`.litem[data-lop="${lop}"]`);
    if (li) li.classList.add('on');
  }
  applyFilter();
}

function fs(q) { sq = q.trim().toLowerCase(); applyFilter(); }

function applyFilter() {
  VIS = ALL.filter(d => (activeC === 'all' || d.lop === activeC) && (!sq || d.ten.toLowerCase().includes(sq)));
  const vis = new Set(VIS.map(d => d.ten + '|' + d.lop));
  ITEMS.forEach(it => {
    const k = it.name + '|' + it.lop;
    it.el.classList.toggle('dim', !vis.has(k));
    if (!vis.has(k)) it.el.classList.remove('hi');
  });
  document.getElementById('fcnt').textContent = VIS.length + ' / ' + ALL.length + ' người';
}

// ══ LAYOUT ══
function layout() {
  const cloud = document.getElementById('cloud');
  cloud.innerHTML = ''; ITEMS = [];
  const W = cloud.offsetWidth, H = cloud.offsetHeight, CX = W/2, CY = H/2;
  const placed = [];
  const lopC = {};
  ALL.forEach(d => lopC[d.lop] = (lopC[d.lop] || 0) + 1);
  const maxC = Math.max(...Object.values(lopC), 1);

  ALL.forEach((d, i) => {
    const ci = LOP_IDX[d.lop] ?? (i % 15);
    const cnt = lopC[d.lop] || 1;
    const fs = 12 + Math.round((cnt / maxC) * 8) + (Math.random() * 5 | 0);
    const fw = [700,700,800,800,800,900][Math.floor(Math.random() * 6)];
    const tilt = [-3,-2,-1,-1,0,0,0,1,1,2,3][Math.floor(Math.random() * 11)];

    const el = document.createElement('div');
    el.className = `nchip c${ci}`;
    el.dataset.name = d.ten; el.dataset.lop = d.lop;
    const bdgColor = COLORS[ci];
    const bdgText = isLight(bdgColor) ? '#080402' : '#fff';
    el.innerHTML = `<span class="ntxt" style="font-size:${fs}px;font-weight:${fw};transform:rotate(${tilt}deg)">${d.ten}</span><span class="nbadge" style="background:${bdgColor};color:${bdgText}">${d.lop}</span>`;
    cloud.appendChild(el);

    const w = el.offsetWidth, h = el.offsetHeight;
    let px, py, tries = 0;
    const a0 = Math.random() * Math.PI * 2;
    do {
      const r = 20 + tries * 2.6, a = a0 + tries * 0.42;
      px = CX + r * Math.cos(a) - w/2;
      py = CY + r * Math.sin(a) - h/2;
      tries++;
    } while (tries < 500 && (overlap(px,py,w,h,placed) || px<10 || py<10 || px+w>W-10 || py+h>H-10));

    el.style.left = px + 'px'; el.style.top = py + 'px';
    el.style.animation = `floatIn .5s ${(i * .01).toFixed(2)}s both`;
    placed.push({x:px,y:py,w,h});
    ITEMS.push({el, cx:px+w/2, cy:py+h/2, name:d.ten, lop:d.lop, ci, color:COLORS[ci]});
  });

  document.getElementById('fcnt').textContent = ALL.length + ' / ' + ALL.length + ' người';
}

function overlap(x,y,w,h,p) {
  return p.some(q => x<q.x+q.w+5 && x+w+5>q.x && y<q.y+q.h+5 && y+h+5>q.y);
}

function isLight(hex) {
  try { const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return .299*r+.587*g+.114*b>160; } catch{return false;}
}

// ══ MAGNIFIER ══
const MAG_R = 115, MAG_Z = 2.5;

function initMag() {
  const canvas = document.getElementById('mag-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = MAG_R*2; canvas.height = MAG_R*2;
  document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; moveMag(ctx); moveCur(); highlightNear(); });
  document.addEventListener('mouseleave', () => document.getElementById('mag').style.display='none');
}

function moveMag(ctx) {
  const mag = document.getElementById('mag');
  mag.style.display = 'block';
  const off = MAG_R + 22;
  let lx = mx+off, ly = my-MAG_R;
  if (lx+MAG_R*2>window.innerWidth-10) lx=mx-off-MAG_R*2;
  if (ly<10) ly=10;
  if (ly+MAG_R*2>window.innerHeight-10) ly=window.innerHeight-MAG_R*2-10;
  mag.style.left = lx+'px'; mag.style.top = ly+'px';

  const cloud = document.getElementById('cloud');
  const rect = cloud.getBoundingClientRect();
  const sx = mx-rect.left-MAG_R/MAG_Z, sy = my-rect.top-MAG_R/MAG_Z;

  ctx.clearRect(0, 0, MAG_R*2, MAG_R*2);
  ctx.save();
  ctx.beginPath(); ctx.arc(MAG_R, MAG_R, MAG_R, 0, Math.PI*2); ctx.clip();
  ctx.fillStyle = 'rgba(8,4,2,.9)'; ctx.fillRect(0,0,MAG_R*2,MAG_R*2);

  ITEMS.forEach(it => {
    if (it.el.classList.contains('dim')) return;
    const ix = (it.cx-sx)*MAG_Z, iy = (it.cy-sy)*MAG_Z;
    if (ix<-100||ix>MAG_R*2+100||iy<-20||iy>MAG_R*2+20) return;
    const ntxt = it.el.querySelector('.ntxt');
    const fs = parseFloat(ntxt.style.fontSize)*MAG_Z;
    const fw = ntxt.style.fontWeight || 700;
    ctx.font = `${fw} ${fs}px 'Be Vietnam Pro',sans-serif`;
    const isHi = it.el.classList.contains('hi');
    if (isHi) { ctx.shadowColor=it.color; ctx.shadowBlur=16; ctx.fillStyle=it.color; }
    else { ctx.shadowBlur=0; ctx.fillStyle=it.color+'88'; }
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(it.name, ix, iy);
    ctx.shadowBlur=0;
  });
  ctx.restore();
}

function highlightNear() {
  const cloud = document.getElementById('cloud');
  const rect = cloud.getBoundingClientRect();
  const cx=mx-rect.left, cy=my-rect.top;
  let nearest=null, nd=Infinity;
  ITEMS.forEach(it => {
    if (it.el.classList.contains('dim')) { it.el.classList.remove('hi'); return; }
    const dx=it.cx-cx, dy=it.cy-cy, dist=Math.sqrt(dx*dx+dy*dy);
    it.el.classList.toggle('hi', dist<75);
    if (dist<nd) { nd=dist; nearest=it; }
  });
  const tip = document.getElementById('tip');
  if (nearest && nd<38) {
    tip.style.display='block';
    tip.textContent = nearest.name + ' · ' + nearest.lop;
    tip.style.background = nearest.color;
    tip.style.color = isLight(nearest.color) ? '#080402' : '#fff';
    tip.style.left = mx+'px'; tip.style.top = (my-46)+'px';
    tip.style.boxShadow = `0 4px 22px ${nearest.color}55`;
  } else { tip.style.display='none'; }
}

// ══ CURSOR ══
function initCursor() {
  const c1=document.getElementById('cur'), c2=document.getElementById('cur2');
  let tx=0, ty=0;
  document.addEventListener('mousemove', e => { c1.style.left=e.clientX+'px'; c1.style.top=e.clientY+'px'; tx=e.clientX; ty=e.clientY; });
  (function lag() { const cx=parseFloat(c2.style.left||0),cy=parseFloat(c2.style.top||0); c2.style.left=(cx+(tx-cx)*.11)+'px'; c2.style.top=(cy+(ty-cy)*.11)+'px'; requestAnimationFrame(lag); })();
}
function moveCur() { document.getElementById('cur').style.left=mx+'px'; document.getElementById('cur').style.top=my+'px'; }

// ══ RESIZE ══
let rt;
window.addEventListener('resize', () => { clearTimeout(rt); rt=setTimeout(layout,300); });

// ══ START ══
loadData();
</script>
